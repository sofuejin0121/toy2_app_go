# Render の無料 Web サービスは一定時間アクセスが無いとスピンダウンする。
# このワークフローを定期実行し、本番 URL へ HTTP GET することで起きっぱなしに近い状態を保つ。
#
# セットアップ:
#   GitHub リポジトリ → Settings → Secrets and variables → Actions → New repository secret
#   名前: RENDER_HEALTHCHECK_URL
#   値:   https://<あなたのサービス名>.onrender.com/api/health
#
# 手動で一度試す: Actions タブ → 「Render healthcheck」→ Run workflow

name: Render healthcheck

on:
  schedule:
    # UTC。10 分毎（Render のアイドル時間より短い間隔が無難）
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render (wake / keep warm)
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${HEALTHCHECK_URL:-}" ]; then
            echo "::error::Repository secret RENDER_HEALTHCHECK_URL が未設定です。README のワークフロー先頭コメントを参照してください。"
            exit 1
          fi
          curl -fsS --max-time 60 "$HEALTHCHECK_URL"
