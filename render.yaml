services:
  - type: web
    name: toy-app2
    runtime: go
    buildCommand: go build -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: GO_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAILER_FROM
        sync: false
      - key: APP_HOST
        sync: false
